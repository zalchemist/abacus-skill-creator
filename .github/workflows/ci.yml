name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check scripts/
      - run: ruff format --check scripts/

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: python -m pytest tests/ -v

  validate-skills:
    name: Validate bundled skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate all bundled skills
        run: |
          exit_code=0
          for skill_dir in skills/*/; do
            echo "--- Validating $skill_dir ---"
            python3 scripts/validate.py "$skill_dir" || exit_code=1
          done
          exit $exit_code

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Security scan all bundled skills
        run: |
          exit_code=0
          for skill_dir in skills/*/; do
            echo "--- Scanning $skill_dir ---"
            python3 scripts/security_scan.py "$skill_dir" || exit_code=1
          done
          exit $exit_code
